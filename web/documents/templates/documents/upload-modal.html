{% load static %}
{% load i18n %}
<script>window.UPLOAD_MODAL_ICONS_BASE = "{% static 'icons' %}";</script>
<script>window.TEXT_INPUT_URL = "{% url 'documents:text_input_page' workspace.workspace_id %}";</script>
<!-- Upload Modal Overlay -->
<div class="upload-modal-overlay" id="uploadModalOverlay" style="display:none;">
    <div class="upload-modal" id="uploadModal">

        <!-- Header -->
        <div class="upload-modal__header">
            <div>
                <h2 class="upload-modal__title">{% trans "File Upload" %}</h2>
                <p class="upload-modal__subtitle">{% trans "Choose a file and upload securely to proceed." %}</p>
            </div>
            <button class="upload-modal__close" type="button" id="uploadModalClose" aria-label="{% trans 'Close' %}">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <!-- Dropzone -->
        <div class="upload-modal__dropzone" id="uploadDropzone">
            <div class="upload-modal__dropzone-content">
                <img class="upload-modal__dropzone-illustration" src="{% static 'icons/Document upload icon.svg' %}" alt="{% trans 'Upload documents' %}" width="100" height="104">
                <p class="upload-modal__dropzone-title">{% trans "Drag and drop your files" %}</p>
                <p class="upload-modal__dropzone-formats">{% trans "PDF, TXT, CSV, DOC, DOCX, XLS, XLSX, PPT, and PPTX formats." %}</p>
                <div class="upload-modal__dropzone-actions">
                    <button class="upload-modal__action-btn" type="button" id="uploadPickerBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        {% trans "Upload" %}
                    </button>
                    <button class="upload-modal__action-btn" type="button" id="textInputBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
                            <path d="M8 8h8M8 12h8M8 16h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        {% trans "Text Input" %}
                    </button>
                </div>
            </div>
        </div>

        <!-- Uploaded Files List -->
        <div class="upload-modal__files" id="uploadFilesList" style="display:none;">
            <h3 class="upload-modal__files-title">{% trans "Uploaded Files" %}</h3>
            <div class="upload-modal__file-list" id="uploadFileList"></div>
        </div>

        <!-- Footer -->
        <div class="upload-modal__footer">
            <button class="upload-modal__btn-cancel" type="button" id="uploadModalCancel">{% trans "Cancel" %}</button>
            <button class="upload-modal__btn-submit" type="button" id="uploadModalSubmit" disabled>{% trans "Submit" %}</button>
        </div>

    </div>

    <!-- Hidden file input -->
    <input type="file" id="uploadFileInput" multiple accept=".pdf,.txt,.csv,.doc,.docx,.xls,.xlsx,.ppt,.pptx" style="display:none;">
</div>

<script>
            (function () {
                const _t = (typeof gettext === 'function') ? gettext : (s) => s;
                const _interp = (typeof interpolate === 'function') ? interpolate : function (fmt, obj) {
                    return fmt.replace(/%\(\w+\)s/g, function (m) {
                        var k = m.slice(2, -2);
                        return obj[k] != null ? obj[k] : m;
                    });
                };
                const ACCEPTED_EXTENSIONS = ['pdf','txt','csv','doc','docx','xls','xlsx','ppt','pptx'];
                const ICONS_BASE = (typeof window.UPLOAD_MODAL_ICONS_BASE !== 'undefined' ? window.UPLOAD_MODAL_ICONS_BASE : '../../../components/icons');

                const overlay   = document.getElementById('uploadModalOverlay');
                const modal     = document.getElementById('uploadModal');
                const closeBtn  = document.getElementById('uploadModalClose');
                const cancelBtn = document.getElementById('uploadModalCancel');
                const submitBtn = document.getElementById('uploadModalSubmit');
                const dropzone  = document.getElementById('uploadDropzone');
                const pickerBtn = document.getElementById('uploadPickerBtn');
                const fileInput = document.getElementById('uploadFileInput');
                const filesSection = document.getElementById('uploadFilesList');
                const fileListEl   = document.getElementById('uploadFileList');

                if (!overlay || !modal) return;

                let files = [];
                let fileIdCounter = 0;
                let dragCounter = 0;

                function getFileExtension(name) {
                    const parts = name.split('.');
                    return parts.length > 1 ? parts.pop().toLowerCase() : '';
                }

                function getFileIconName(ext) {
                    if (ext === 'pdf') return 'pdf';
                    if (ext === 'doc' || ext === 'docx') return 'doc';
                    if (ext === 'txt') return 'txt';
                    return 'file';
                }

                function formatFileSize(bytes) {
                    if (bytes < 1024) return bytes + 'B';
                    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
                    return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
                }

                function getCookie(name) {
                    const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
                    return match ? match[2] : '';
                }

                function openModal() {
                    overlay.style.display = '';
                    document.body.style.overflow = 'hidden';
                }

                function closeModal() {
                    overlay.style.display = 'none';
                    document.body.style.overflow = '';
                    resetModal();
                }

                function resetModal() {
                    files = [];
                    fileIdCounter = 0;
                    dragCounter = 0;
                    filesSection.style.display = 'none';
                    fileListEl.innerHTML = '';
                    submitBtn.disabled = true;
                    dropzone.classList.remove('dragover');
                }

                function updateSubmitState() {
                    if (files.length === 0) {
                        submitBtn.disabled = true;
                        return;
                    }
                    const allDone = files.every(f => f.progress >= 100);
                    submitBtn.disabled = !allDone;
                }

                function renderFileRow(fileObj) {
                    const row = document.createElement('div');
                    row.className = 'upload-modal__file-row';
                    row.dataset.fileId = fileObj.id;

                    const iconName = getFileIconName(fileObj.ext);
                    const sizeStr = formatFileSize(fileObj.size);

                    row.innerHTML =
                        '<div class="upload-modal__file-icon">' +
                            '<img src="' + ICONS_BASE + '/' + iconName + '.svg" alt="' + fileObj.ext + '" width="32" height="32">' +
                        '</div>' +
                        '<div class="upload-modal__file-info">' +
                            '<span class="upload-modal__file-name" dir="auto">' + fileObj.name + '</span>' +
                            '<span class="upload-modal__file-status" data-status-id="' + fileObj.id + '">' +
                                sizeStr + ' | ' + _t('Ready') +
                            '</span>' +
                        '</div>' +
                        '<button class="upload-modal__file-delete" type="button" data-delete-id="' + fileObj.id + '" aria-label="' + _t('Remove file') + '">' +
                            '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
                                '<path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>' +
                            '</svg>' +
                        '</button>';

                    return row;
                }

                function setFileStatus(fileObj, label, done) {
                    const statusEl = fileListEl.querySelector('[data-status-id="' + fileObj.id + '"]');
                    if (!statusEl) return;
                    statusEl.textContent = formatFileSize(fileObj.size) + ' | ' + label;
                    statusEl.classList.toggle('upload-modal__file-status--done', !!done);
                }

                function addFiles(rawFiles) {
                    let added = false;
                    for (let i = 0; i < rawFiles.length; i++) {
                        const f = rawFiles[i];
                        const ext = getFileExtension(f.name);
                        if (!ACCEPTED_EXTENSIONS.includes(ext)) continue;

                        const fileObj = {
                            id: ++fileIdCounter,
                            name: f.name,
                            size: f.size,
                            ext: ext,
                            file: f,
                            progress: 100,
                        };
                        files.push(fileObj);

                        const row = renderFileRow(fileObj);
                        fileListEl.appendChild(row);
                        setFileStatus(fileObj, _t('Ready'), true);
                        added = true;
                    }

                    if (added) {
                        filesSection.style.display = '';
                        updateSubmitState();
                    }
                }

                function removeFile(id) {
                    const idx = files.findIndex(f => f.id === id);
                    if (idx === -1) return;
                    files.splice(idx, 1);

                    const row = fileListEl.querySelector('[data-file-id="' + id + '"]');
                    if (row) row.remove();

                    if (files.length === 0) {
                        filesSection.style.display = 'none';
                    }
                    updateSubmitState();
                }

                /* --- Event listeners --- */

                closeBtn.addEventListener('click', closeModal);
                cancelBtn.addEventListener('click', closeModal);

                overlay.addEventListener('click', function (e) {
                    if (e.target === overlay) closeModal();
                });

                modal.addEventListener('click', function (e) {
                    e.stopPropagation();
                });

                /* Drag and drop */
                dropzone.addEventListener('dragenter', function (e) {
                    e.preventDefault();
                    dragCounter++;
                    dropzone.classList.add('dragover');
                });

                dropzone.addEventListener('dragover', function (e) {
                    e.preventDefault();
                });

                dropzone.addEventListener('dragleave', function (e) {
                    e.preventDefault();
                    dragCounter--;
                    if (dragCounter <= 0) {
                        dragCounter = 0;
                        dropzone.classList.remove('dragover');
                    }
                });

                dropzone.addEventListener('drop', function (e) {
                    e.preventDefault();
                    dragCounter = 0;
                    dropzone.classList.remove('dragover');
                    if (e.dataTransfer.files.length > 0) {
                        addFiles(e.dataTransfer.files);
                    }
                });

                /* File picker */
                pickerBtn.addEventListener('click', function () {
                    fileInput.click();
                });

                fileInput.addEventListener('change', function () {
                    if (fileInput.files.length > 0) {
                        addFiles(fileInput.files);
                    }
                    fileInput.value = '';
                });

                /* Delete file */
                fileListEl.addEventListener('click', function (e) {
                    const deleteBtn = e.target.closest('[data-delete-id]');
                    if (deleteBtn) {
                        removeFile(parseInt(deleteBtn.dataset.deleteId));
                    }
                });

                /* Submit — actually send files to the backend */
                submitBtn.addEventListener('click', async function () {
                    if (submitBtn.disabled) return;

                    const workspaceId = (typeof window.WORKSPACE_ID !== 'undefined' && window.WORKSPACE_ID !== '')
                        ? window.WORKSPACE_ID
                        : null;
                    if (!workspaceId) {
                        alert(_t('Workspace not loaded. Please refresh the page.'));
                        return;
                    }

                    submitBtn.disabled = true;
                    submitBtn.textContent = _t('Uploading…');

                    const failures = [];

                    for (const fileObj of files) {
                        const formData = new FormData();
                        formData.append('file', fileObj.file);
                        formData.append('workspace_id', workspaceId);

                        setFileStatus(fileObj, _t('Uploading…'), false);

                        try {
                            const response = await fetch('/documents/upload/', {
                                method: 'POST',
                                headers: {
                                    'X-CSRFToken': getCookie('csrftoken'),
                                },
                                body: formData,
                            });

                            if (!response.ok) {
                                const err = await response.json().catch(() => ({}));
                                const msg = err.error || ('HTTP ' + response.status);
                                console.error('Upload error for', fileObj.name, err);
                                setFileStatus(fileObj, _interp(_t('Failed: %(msg)s'), { msg: msg }, true), false);
                                failures.push(fileObj.name + ': ' + msg);
                            } else {
                                const data = await response.json();
                                console.log('Uploaded successfully:', fileObj.name, data);
                                setFileStatus(fileObj, _t('Uploaded'), true);
                            }
                        } catch (err) {
                            console.error('Network error uploading', fileObj.name, err);
                            setFileStatus(fileObj, _t('Network error'), false);
                            failures.push(fileObj.name + ': network error');
                        }
                    }

                    if (failures.length === 0) {
                        closeModal();
                        window.location.reload();
                    } else {
                        alert(_t('Upload failed:') + '\n\n' + failures.join('\n'));
                        submitBtn.disabled = false;
                        submitBtn.textContent = _t('Retry');
                    }
                });

                /* Expose open function globally */
                const uploadBtn = document.getElementById('uploadBtn');
                if (uploadBtn) uploadBtn.addEventListener('click', openModal);
                window.openUploadModal = openModal;

                /* Text Input button — redirect to the Text Input page */
                const textInputBtn = document.getElementById('textInputBtn');
                if (textInputBtn) {
                    textInputBtn.addEventListener('click', function () {
                        const url = (typeof window.TEXT_INPUT_URL !== 'undefined')
                            ? window.TEXT_INPUT_URL
                            : '/documents/text-input/';
                        window.location.href = url;
                    });
                }
            })();
</script>
