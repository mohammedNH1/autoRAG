# Overlay that enables NVIDIA GPU acceleration for the Ollama container.
# Use only if!
#   * You have an NVIDIA GPU
#   * Docker is configured for GPU passthrough.
#=========================================================================
# [Usage] type this command in the terminal:
#
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
#
#=========================================================================
services:
  ollama:
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
