services:
  web:
    build: .
    container_name: django_web_test
    command: python web/manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - PYTHONUNBUFFERED=1

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_test
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_test
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/some/path/inside/container

volumes:
  qdrant_storage:
  ollama_data: