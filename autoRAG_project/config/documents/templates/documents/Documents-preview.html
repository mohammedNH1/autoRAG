<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="fake-csrf-token-for-preview">
    <title>Documents - AutoRAG (Preview)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/documents.css">
</head>

<body>
    <div class="documents-page">

        <!-- ============================================================
             SIDEBAR — icon rail navigation (shared across pages)
             ============================================================ -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="../../../components/logo.svg" alt="AutoRAG" width="32" height="32">
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="sidebar-icon" title="Sessions">
                    <img src="../../../workspace/static/Sidebar_icons/Sessions.svg" alt="Sessions" width="24" height="24">
                </button>

                <button class="sidebar-icon" title="Members">
                    <img src="../../../workspace/static/Sidebar_icons/Members.svg" alt="Members" width="24" height="24">
                </button>

                <button class="sidebar-icon active" title="Documents">
                    <img src="../../../workspace/static/Sidebar_icons/Documents.svg" alt="Documents" width="24" height="24">
                </button>

                <button class="sidebar-icon" title="Notifications">
                    <img src="../../../workspace/static/Sidebar_icons/Notification.svg" alt="Notifications" width="24" height="24">
                </button>
            </nav>

            <div class="sidebar-footer">
                <button class="sidebar-icon" title="Settings">
                    <img src="../../../workspace/static/Sidebar_icons/Settings.svg" alt="Settings" width="24" height="24">
                </button>

                <button class="sidebar-icon no-blue-hover" title="Profile">
                    <img src="../../../workspace/static/Sidebar_icons/Profile.svg" alt="Profile" width="24" height="24">
                </button>
            </div>
        </aside>

        <!-- ============================================================
             MAIN CONTENT — header, toolbar, document grid
             ============================================================ -->
        <main class="main-content">

            <header class="page-header">
                <h1 class="page-title">Documents</h1>
                <p class="page-subtitle" id="documentCount">0 Items</p>
            </header>

            <div class="toolbar">
                <div class="toolbar-left">
                    <button class="sort-dropdown" id="sortDropdown" type="button">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/>
                            <path d="M3 10h18" stroke="currentColor" stroke-width="1.8"/>
                            <path d="M8 2v4M16 2v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                        <span id="sortLabel">Newest First</span>
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:12px;height:12px;">
                            <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>

                <div class="toolbar-right">
                    <div class="search-bar">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/>
                            <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                        <input
                            type="text"
                            class="search-input"
                            id="searchInput"
                            placeholder="Search files and folders..."
                            autocomplete="off"
                        >
                    </div>

                    <button class="upload-btn" type="button" title="Upload document" id="uploadBtn">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
            </div>

            <section class="documents-grid-wrapper">
                <div class="documents-grid" id="documentsGrid"></div>
            </section>

        </main>

        <!-- ============================================================
             FILE DETAILS PANEL — right sidebar showing selected file info
             ============================================================ -->
        <aside class="details-panel hidden" id="detailsPanel">
            <div class="details-header">
                <h2 class="details-title">File Details</h2>
                <button class="details-overview__menu" type="button" aria-label="More options">
                    <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
                    </svg>
                </button>
            </div>
            <div id="detailsBody"></div>
        </aside>

    </div>

    <script>
        /* --- Constants --- */
        const ICONS_BASE = '../../../components/icons';
        const OVERVIEW_ICONS_BASE = ICONS_BASE + '/File overview icons';
        const CODE_EXTENSIONS = ['tsx', 'jsx', 'js', 'py', 'html', 'css'];
        const SEL_CARD = '.doc-card';
        const SEL_CARD_MENU = '.doc-card__menu';

        /* --- Helpers --- */
        function formatUploadedAt(raw) {
            if (!raw || raw === '—') return '—';
            const d = new Date(raw);
            if (isNaN(d)) return raw;
            const dd = String(d.getDate()).padStart(2, '0');
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const yyyy = d.getFullYear();
            const hh = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            return `${dd}/${mm}/${yyyy} \u2022 ${hh}:${min}`;
        }

        function getIconFilename(ext) {
            if (ext === 'pdf') return 'pdf';
            if (ext === 'doc' || ext === 'docx') return 'doc';
            if (ext === 'txt') return 'txt';
            if (CODE_EXTENSIONS.includes(ext)) return 'code';
            return 'file';
        }

        function getDisplayName(doc) {
            return doc.document_title != null ? String(doc.document_title) : 'Untitled';
        }

        /* --- Render functions --- */
        function renderDocumentCard(doc, isSelected) {
            const iconName = getIconFilename(doc.file_extension);
            const extLabel = doc.file_extension || 'file';
            const displayName = getDisplayName(doc);
            const titleSafe = displayName.replace(/"/g, '&quot;');
            return `
                <article
                    class="doc-card${isSelected ? ' selected' : ''}"
                    data-document-id="${doc.id}"
                    data-filename="${titleSafe}"
                >
                    <div class="doc-card__preview">
                        <img
                            class="doc-card__icon"
                            src="${ICONS_BASE}/${iconName}.svg"
                            alt="${extLabel} file"
                        />
                    </div>
                    <div class="doc-card__footer">
                        <div class="doc-card__name" title="${titleSafe}">
                            ${displayName}
                        </div>
                        <button class="doc-card__menu" type="button" aria-label="More options">
                            <img
                                class="doc-card__menu-icon"
                                src="${ICONS_BASE}/more.svg"
                                alt=""
                            />
                        </button>
                    </div>
                </article>`;
        }

        function renderOverviewRow(iconFile, label, value) {
            return `
                        <div class="details-overview__row">
                            <img class="details-overview__row-icon" src="${OVERVIEW_ICONS_BASE}/${iconFile}.svg" alt="" />
                            <div class="details-overview__row-text">
                                <span class="details-overview__row-label">${label}</span>
                                <span class="details-overview__row-value">${value}</span>
                            </div>
                        </div>`;
        }

        function renderDetailsPanel(doc) {
            if (!doc) return '';

            const detailsName = getDisplayName(doc);
            const iconName = getIconFilename(doc.file_extension);
            const statusHtml = doc.is_indexed
                ? `<span class="details-status indexed">
                       Indexed
                       <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                           <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                       </svg>
                   </span>`
                : '<span class="details-status pending-index">Pending</span>';

            const uploadedBy = doc.uploaded_by || '—';
            const uploadedAt = formatUploadedAt(doc.uploaded_at);
            const totalChunks = doc.total_chunks != null ? doc.total_chunks + ' chunks' : '—';
            const usedIn = doc.used_in_answers != null ? doc.used_in_answers + ' times' : '—';

            return `
                <div class="details-body">
                    <div class="details-card">
                        <img class="details-card__icon"
                             src="${ICONS_BASE}/${iconName}.svg"
                             alt="${doc.file_extension || 'file'} file" />
                        ${statusHtml}
                        <span class="details-filename">${detailsName}</span>
                    </div>
                </div>

                <div class="details-overview">
                    <div class="details-overview__header">
                        <h3 class="details-overview__title">File Overview</h3>
                        <button class="details-overview__menu" type="button" aria-label="More options">
                            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
                            </svg>
                        </button>
                    </div>
                    <div class="details-overview__list">
                        ${renderOverviewRow('user', 'Uploaded by', uploadedBy)}
                        ${renderOverviewRow('date', 'Uploaded at', uploadedAt)}
                        ${renderOverviewRow('chunk', 'Total chunks', totalChunks)}
                        ${renderOverviewRow('chat', 'Used in answers', usedIn)}
                    </div>
                </div>`;
        }

        function setDetailsVisible(panel, visible) {
            panel.classList.toggle('hidden', !visible);
        }

        function renderPage(data, grid, detailsBody) {
            document.getElementById('documentCount').textContent = data.document_count + ' Items';

            const selectedId = data.selected_document ? data.selected_document.id : null;
            setDetailsVisible(document.getElementById('detailsPanel'), !!data.selected_document);

            if (data.documents.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 80px 0; color: #999;">
                        <svg width="64" height="64" viewBox="0 0 48 56" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:16px;opacity:0.4;">
                            <path d="M4 4a4 4 0 014-4h22l14 14v38a4 4 0 01-4 4H8a4 4 0 01-4-4V4z" fill="#f5f5f5" stroke="#ccc" stroke-width="1.5"/>
                            <path d="M30 0v10a4 4 0 004 4h10" fill="#eee" stroke="#ccc" stroke-width="1.5"/>
                        </svg>
                        <p style="font-size:15px;font-weight:500;margin-bottom:4px;">No documents yet</p>
                        <p style="font-size:13px;">Upload your first document to get started.</p>
                    </div>`;
            } else {
                grid.innerHTML = data.documents
                    .map(doc => renderDocumentCard(doc, doc.id === selectedId))
                    .join('');
            }

            detailsBody.innerHTML = renderDetailsPanel(data.selected_document);
        }

        /* --- Init + event handlers --- */
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('documentsGrid');
            const detailsBody = document.getElementById('detailsBody');
            const searchInput = document.getElementById('searchInput');

            fetch('../../static/data/mock-data.json')
                .then(res => res.json())
                .then(data => {
                    renderPage(data, grid, detailsBody);

                    const detailsPanel = document.getElementById('detailsPanel');
                    const gridWrapper = grid ? grid.closest('.documents-grid-wrapper') : null;
                    if (gridWrapper) {
                        gridWrapper.addEventListener('click', (e) => {
                            if (e.target.closest(SEL_CARD_MENU)) return;
                            const card = e.target.closest(SEL_CARD);

                            grid.querySelectorAll(SEL_CARD).forEach(c => c.classList.remove('selected'));

                            if (!card) {
                                detailsBody.innerHTML = '';
                                setDetailsVisible(detailsPanel, false);
                                return;
                            }

                            card.classList.add('selected');
                            const docId = parseInt(card.dataset.documentId);
                            const doc = data.documents.find(d => d.id === docId);
                            detailsBody.innerHTML = renderDetailsPanel(doc);
                            setDetailsVisible(detailsPanel, true);
                        });
                    }

                    if (searchInput) {
                        searchInput.addEventListener('input', () => {
                            const query = searchInput.value.toLowerCase();
                            const cards = grid ? grid.querySelectorAll(SEL_CARD) : [];
                            cards.forEach(card => {
                                const filename = (card.dataset.filename || '').toLowerCase();
                                card.style.display = filename.includes(query) ? '' : 'none';
                            });
                        });
                    }
                })
                .catch(err => console.error('Failed to load mock data:', err));
        });
    </script>
</body>
</html>
